<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mood & Habit Tracker | Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="app-shell">
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top glass-nav">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">MoodTrack</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="form.html">Track mood</a></li>
          <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      <div class="row g-4 mb-4">
        <div class="col-md-4">
          <div class="stat-card shadow-sm">
            <div class="stat-label">Total entries</div>
            <div class="stat-value" id="totalEntries">0</div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="stat-card shadow-sm">
            <div class="stat-label">Latest mood</div>
            <div class="stat-value" id="latestMood">—</div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="stat-card shadow-sm">
            <div class="stat-label">Most recent date</div>
            <div class="stat-value stat-small" id="latestDate">No entries yet</div>
          </div>
        </div>
      </div>

      <div class="card shadow-lg border-0 mb-4">
        <div class="card-body p-4 p-md-5">
          <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
            <div>
              <p class="text-uppercase text-muted small mb-1">Your diary</p>
              <h1 class="h3 mb-0">Saved mood entries</h1>
            </div>
            <a href="form.html" class="btn btn-primary">Add new entry</a>
          </div>

          <div id="entrySummary" class="summary-box d-none mb-4"></div>
          <div id="entriesContainer" class="row g-4"></div>
          <div id="emptyState" class="empty-state text-center py-5 d-none">
            <div class="display-1 mb-3">📒</div>
            <h2 class="h4">No entries yet</h2>
            <p class="text-muted mb-4">Submit the form to create your first diary entry.</p>
            <a href="form.html" class="btn btn-primary">Start tracking</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/form.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
