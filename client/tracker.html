<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="theme-light">
<nav class="navbar navbar-expand-lg border-bottom">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/index.html">MHT</a>
    <div class="d-flex gap-2 ms-auto align-items-center">
      <a class="btn btn-sm btn-outline-primary" href="/dashboard.html" data-i18n="navDashboard">Dashboard</a>
      <button class="btn btn-sm btn-outline-secondary theme-toggle" data-theme-toggle>Theme</button>
      <button class="btn btn-sm btn-outline-secondary lang-toggle" data-lang-toggle>EN</button>
      <button class="btn btn-sm btn-outline-danger" data-logout data-i18n="logout">Logout</button>
    </div>
  </div>
</nav>
<main class="container page-wrap">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-xl-7">
      <div class="card p-4">
        <h2 class="mb-3" data-i18n="trackerTitle">Add a mood entry</h2>
        <div class="display-4 mb-3" id="emojiHint">🙂</div>
        <form id="trackerForm" novalidate>
          <div class="mb-3">
            <label class="form-label">Mood</label>
            <select name="mood" class="form-select" required>
              <option value="">Choose mood</option>
              <option>😞</option>
              <option>😐</option>
              <option>🙂</option>
              <option>😊</option>
              <option>🤩</option>
            </select>
            <div class="error-message"></div>
          </div>
          <div class="mb-3" data-habits-group>
            <label class="form-label">Habits</label>
            <div class="row g-2">
              <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="habits" value="sport" id="h1"><label class="form-check-label" for="h1">Sport</label></div></div>
              <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="habits" value="study" id="h2"><label class="form-check-label" for="h2">Study</label></div></div>
              <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="habits" value="reading" id="h3"><label class="form-check-label" for="h3">Reading</label></div></div>
              <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="habits" value="sleep" id="h4"><label class="form-check-label" for="h4">Sleep</label></div></div>
            </div>
            <div class="error-message"></div>
          </div>
          <div class="mb-3">
            <label class="form-label" data-i18n="comment">Comment</label>
            <textarea name="comment" class="form-control" rows="4" required placeholder="Write something..."></textarea>
            <div class="error-message"></div>
          </div>
          <button class="btn btn-accent" type="submit" data-i18n="submit">Submit</button>
        </form>
      </div>
    </div>
  </div>
</main>
<script src="/js/ui.js"></script>
<script src="/js/form.js"></script>
<script src="/js/tracker.js"></script>
</body>
</html>
