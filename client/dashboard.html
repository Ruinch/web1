<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="theme-light">
<nav class="navbar navbar-expand-lg border-bottom">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/index.html">MHT</a>
    <div class="d-flex flex-wrap gap-2 ms-auto align-items-center">
      <a class="btn btn-sm btn-outline-primary" href="/tracker.html" data-i18n="navTracker">Tracker</a>
      <button class="btn btn-sm btn-outline-secondary theme-toggle" data-theme-toggle>Theme</button>
      <button class="btn btn-sm btn-outline-secondary lang-toggle" data-lang-toggle>EN</button>
      <button class="btn btn-sm btn-outline-danger" data-logout data-i18n="logout">Logout</button>
    </div>
  </div>
</nav>
<main class="container page-wrap">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h2 class="mb-1" data-i18n="dashboardTitle">Mood dashboard</h2>
      <div id="statsText" class="text-muted">Total entries: 0</div>
    </div>
    <div class="d-flex gap-2">
      <button id="exportJsonBtn" class="btn btn-outline-primary" data-i18n="exportJson">Export JSON</button>
      <button id="exportCsvBtn" class="btn btn-outline-primary" data-i18n="exportCsv">Export CSV</button>
    </div>
  </div>

  <div class="row g-3 mb-3">
    <div class="col-md-4"><input id="searchInput" class="form-control" placeholder="Search by comment"></div>
    <div class="col-md-2"><input id="filterDate" type="date" class="form-control"></div>
    <div class="col-md-2"><select id="filterMood" class="form-select"><option value="">All moods</option><option>😞</option><option>😐</option><option>🙂</option><option>😊</option><option>🤩</option></select></div>
    <div class="col-md-2"><select id="filterHabit" class="form-select"><option value="">All habits</option><option value="sport">Sport</option><option value="study">Study</option><option value="reading">Reading</option><option value="sleep">Sleep</option></select></div>
    <div class="col-md-2 d-grid"><a href="/tracker.html" class="btn btn-accent">+ New</a></div>
  </div>

  <div class="row mb-4">
    <div class="col-lg-7 mb-3">
      <div class="card p-3 h-100">
        <h5 class="mb-3">Mood chart</h5>
        <canvas id="moodChart" height="130"></canvas>
      </div>
    </div>
    <div class="col-lg-5 mb-3">
      <div class="card p-3 h-100">
        <h5 class="mb-3">Habits chart</h5>
        <canvas id="habitChart" height="130"></canvas>
      </div>
    </div>
  </div>

  <div class="row mb-4">
    <div class="col-lg-8 mb-3">
      <div class="card p-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="mb-0">Calendar</h5>
          <span id="monthLabel" class="text-muted"></span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>
    </div>
    <div class="col-lg-4 mb-3">
      <div class="card p-3 h-100">
        <h5 class="mb-3">Day records</h5>
        <div id="dayRecords" class="day-records text-muted">Click a day in the calendar.</div>
      </div>
    </div>
  </div>

  <div class="row mb-4">
    <div class="col-lg-5 mb-3">
      <div class="card p-3 h-100">
        <h5 class="mb-3">Goals</h5>
        <form id="goalForm" class="row g-2 mb-3">
          <div class="col-6"><select name="habit" class="form-select"><option value="sport">Sport</option><option value="study">Study</option><option value="reading">Reading</option><option value="sleep">Sleep</option></select></div>
          <div class="col-4"><input name="target" type="number" min="1" value="3" class="form-control"></div>
          <div class="col-2 d-grid"><button class="btn btn-accent" type="submit">+</button></div>
        </form>
        <div id="goalList"></div>
      </div>
    </div>
    <div class="col-lg-7 mb-3">
      <div class="card p-3 h-100">
        <h5 class="mb-3">Entries</h5>
        <div id="cardsContainer" class="row"></div>
        <div class="d-grid mt-3"><button id="loadMoreBtn" class="btn btn-outline-primary">Load more</button></div>
      </div>
    </div>
  </div>
</main>

<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Edit entry</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form id="editForm">
          <div class="mb-3"><label class="form-label">Mood</label><select name="mood" class="form-select"><option>😞</option><option>😐</option><option>🙂</option><option>😊</option><option>🤩</option></select></div>
          <div class="mb-3">
            <label class="form-label">Habits</label>
            <div class="d-flex flex-wrap gap-3">
              <div class="form-check"><input class="form-check-input" type="checkbox" name="habits" value="sport" id="eh1"><label class="form-check-label" for="eh1">Sport</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" name="habits" value="study" id="eh2"><label class="form-check-label" for="eh2">Study</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" name="habits" value="reading" id="eh3"><label class="form-check-label" for="eh3">Reading</label></div>
              <div class="form-check"><input class="form-check-input" type="checkbox" name="habits" value="sleep" id="eh4"><label class="form-check-label" for="eh4">Sleep</label></div>
            </div>
          </div>
          <div class="mb-3"><label class="form-label" data-i18n="comment">Comment</label><textarea name="comment" class="form-control" rows="4"></textarea></div>
          <div class="d-flex justify-content-end"><button class="btn btn-accent" type="submit" data-i18n="save">Save</button></div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
