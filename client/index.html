<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mood & Habit Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="theme-light">
<nav class="navbar navbar-expand-lg border-bottom">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/index.html">MHT</a>
    <div class="d-flex gap-2 ms-auto align-items-center">
      <a class="btn btn-sm btn-outline-primary" href="/register.html" data-i18n="navRegister">Register</a>
      <a class="btn btn-sm btn-outline-primary" href="/login.html" data-i18n="navLogin">Login</a>
      <button class="btn btn-sm btn-outline-secondary theme-toggle" data-theme-toggle>Theme</button>
      <button class="btn btn-sm btn-outline-secondary lang-toggle" data-lang-toggle>EN</button>
    </div>
  </div>
</nav>
<main class="container page-wrap">
  <section class="hero p-5 mb-4">
    <div class="row align-items-center">
      <div class="col-lg-7">
        <h1 class="display-5 fw-bold" data-i18n="heroTitle">Track your mood. Improve your life.</h1>
        <p class="lead mt-3" data-i18n="heroText">Capture moods, habits, goals, and progress in one place.</p>
        <button id="startTrackingBtn" class="btn btn-accent btn-lg mt-2" data-i18n="startTracking">Start Tracking</button>
      </div>
      <div class="col-lg-5 mt-4 mt-lg-0">
        <div class="card p-4" data-tilt>
          <h5 class="fw-semibold mb-3">What you get</h5>
          <ul class="mb-0">
            <li>Forms and validation</li>
            <li>Dashboard with CRUD</li>
            <li>Charts, calendar and export</li>
          </ul>
        </div>
      </div>
    </div>
  </section>
</main>
<script src="/js/ui.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
