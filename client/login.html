<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="theme-light">
<nav class="navbar navbar-expand-lg border-bottom">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/index.html">MHT</a>
    <div class="d-flex gap-2 ms-auto align-items-center">
      <a class="btn btn-sm btn-outline-primary" href="/register.html" data-i18n="navRegister">Register</a>
      <button class="btn btn-sm btn-outline-secondary theme-toggle" data-theme-toggle>Theme</button>
      <button class="btn btn-sm btn-outline-secondary lang-toggle" data-lang-toggle>EN</button>
    </div>
  </div>
</nav>
<main class="container page-wrap auth-shell">
  <div class="row justify-content-center w-100">
    <div class="col-lg-6 col-xl-5">
      <div class="card p-4">
        <h2 class="mb-4" data-i18n="loginTitle">Welcome back</h2>
        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label class="form-label" data-i18n="email">Email</label>
            <input type="email" name="email" class="form-control" required placeholder="Email">
            <div class="error-message"></div>
          </div>
          <div class="mb-3">
            <label class="form-label" data-i18n="password">Password</label>
            <div class="input-group">
              <input type="password" name="password" id="loginPassword" class="form-control" minlength="6" required placeholder="Password">
              <button class="btn btn-outline-secondary" type="button" data-toggle-password="loginPassword">Show</button>
            </div>
            <div class="error-message"></div>
          </div>
          <button class="btn btn-accent w-100" type="submit" data-i18n="submit">Submit</button>
        </form>
      </div>
    </div>
  </div>
</main>
<script src="/js/ui.js"></script>
<script src="/js/form.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
