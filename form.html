<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h2>Mood Tracker Form</h2>

  <form id="trackerForm">

    <input type="text" id="name" class="form-control mb-2" placeholder="Name">
    <small class="error" id="nameError"></small>

    <input type="email" id="email" class="form-control mb-2" placeholder="Email">
    <small class="error" id="emailError"></small>

    <select id="mood" class="form-control mb-2">
      <option value="">Select Mood</option>
      <option value="😄">😄 Happy</option>
      <option value="😐">😐 Neutral</option>
      <option value="😢">😢 Sad</option>
      <option value="😡">😡 Angry</option>
    </select>

    <div class="mb-2">
      <label>Habits:</label><br>
      <input type="checkbox" value="Sport"> Sport
      <input type="checkbox" value="Study"> Study
      <input type="checkbox" value="Reading"> Reading
      <input type="checkbox" value="Sleep"> Sleep
      <br>
      <small class="error" id="habitError"></small>
    </div>

    <textarea id="comment" class="form-control mb-2" placeholder="Comment"></textarea>

    <input type="password" id="password" class="form-control mb-2" placeholder="Password">
    <small class="error" id="passwordError"></small>

    <button type="button" class="btn btn-secondary mb-2" onclick="togglePassword()">Show Password</button>

    <button type="submit" class="btn btn-success">Submit</button>

  </form>
</div>

<script src="js/form.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>

</body>
</html>
